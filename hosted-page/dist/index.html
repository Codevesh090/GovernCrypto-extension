<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GovernCrypto — Connect Wallet</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Theme Variables */
    :root, body.theme-dark {
      --bg-main: #000;
      --bg-card: #0a0a0a;
      --text-primary: #fff;
      --text-secondary: #666;
      --text-dim: #333;
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.1);
      --button-bg: #fff;
      --button-text: #000;
    }
    
    body.theme-midnight {
      --bg-main: #0f0a1e;
      --bg-card: #1a1229;
      --text-primary: #e8e0f5;
      --text-secondary: #9b8ab8;
      --text-dim: #4a3d5c;
      --border: rgba(155,138,184,0.12);
      --border-bright: rgba(155,138,184,0.25);
      --button-bg: #a78bfa;
      --button-text: #0f0a1e;
    }
    
    body.theme-ocean {
      --bg-main: #0a1a1a;
      --bg-card: #0f2424;
      --text-primary: #e0f5f5;
      --text-secondary: #6b9999;
      --text-dim: #2d4d4d;
      --border: rgba(107,153,153,0.12);
      --border-bright: rgba(107,153,153,0.25);
      --button-bg: #2dd4bf;
      --button-text: #0a1a1a;
    }
    
    body.theme-light {
      --bg-main: #ffffff;
      --bg-card: #f8f9fa;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --text-dim: #adb5bd;
      --border: rgba(0,0,0,0.08);
      --border-bright: rgba(0,0,0,0.15);
      --button-bg: #059669;
      --button-text: #ffffff;
    }
    
    body.theme-pastel {
      --bg-main: #faf8fc;
      --bg-card: #f5f0f9;
      --text-primary: #4a3456;
      --text-secondary: #8b7a9e;
      --text-dim: #c4b5d4;
      --border: rgba(139,122,158,0.15);
      --border-bright: rgba(139,122,158,0.3);
      --button-bg: #9333ea;
      --button-text: #faf8fc;
    }
    
    body {
      font-family: 'Roboto Mono', monospace;
      background: var(--bg-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      position: relative;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .close-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-bright);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 1000;
    }
    .close-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--border-bright);
    }
    .container {
      text-align: center;
      padding: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 360px;
      width: 90%;
    }
    .logo {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .header p {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }
    .connect-button {
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      padding: 13px 28px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s ease;
      margin-bottom: 16px;
      width: 100%;
    }
    .connect-button:hover { opacity: 0.85; }
    .connect-button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status {
      padding: 12px;
      border-radius: 3px;
      margin-bottom: 16px;
      font-size: 11px;
      letter-spacing: 0.03em;
    }
    .status.connecting { background: rgba(255,255,255,0.04); border: 1px solid var(--border-bright); color: var(--text-secondary); }
    .status.success    { background: rgba(255,255,255,0.04); border: 1px solid var(--border-bright); color: var(--text-primary); }
    .status.error      { background: rgba(239,6,6,0.06);  border: 1px solid rgba(239,6,6,0.2);  color: #EF0606; }
    .status.hidden     { display: none; }
    .loading-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top: 2px solid var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { font-size: 10px; color: var(--text-dim); line-height: 1.4; letter-spacing: 0.02em; }
  </style>
  <script type="module" crossorigin src="/assets/main-DmpUrYFy.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
  <button class="close-btn" onclick="window.close()" title="Close">×</button>
  <div class="container">
    <div class="logo"><img src="/assets/logo-B0bAD8my.png" alt="GovernCrypto" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 6px;">GovernCrypto</div>
    <div class="header">
      <h1>Connect Wallet</h1>
      <p>Choose your wallet to participate in DAO governance</p>
    </div>
    <div class="connect-section">
      <button id="connect-btn" class="connect-button">Choose Wallet</button>
      <div id="status" class="status hidden">
        <span id="status-text"></span>
      </div>
    </div>
    <div class="footer">
      <p>This window closes automatically after connecting</p>
    </div>
  </div>
</body>
</html>
