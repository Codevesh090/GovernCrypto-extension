<!DOCTYPE html>
<html>
<head>
  <title>Generate GovernCrypto Icons</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0f0f0; }
    canvas { border: 1px solid #ccc; margin: 10px; background: white; }
    .container { display: flex; gap: 20px; flex-wrap: wrap; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>GovernCrypto Icon Generator</h1>
  <p>Click the button below to generate and download the icon files:</p>
  <button onclick="generateIcons()">Generate & Download Icons</button>
  <div class="container">
    <div>
      <h3>16x16</h3>
      <canvas id="canvas16" width="16" height="16"></canvas>
    </div>
    <div>
      <h3>48x48</h3>
      <canvas id="canvas48" width="48" height="48"></canvas>
    </div>
    <div>
      <h3>128x128</h3>
      <canvas id="canvas128" width="128" height="128"></canvas>
    </div>
  </div>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 100;

      // Clear canvas
      ctx.clearRect(0, 0, size, size);

      // Draw red G shape
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.moveTo(20 * scale, 20 * scale);
      ctx.lineTo(80 * scale, 20 * scale);
      ctx.lineTo(80 * scale, 50 * scale);
      ctx.lineTo(55 * scale, 50 * scale);
      ctx.lineTo(55 * scale, 60 * scale);
      ctx.lineTo(70 * scale, 60 * scale);
      ctx.lineTo(70 * scale, 70 * scale);
      ctx.lineTo(40 * scale, 70 * scale);
      ctx.lineTo(40 * scale, 40 * scale);
      ctx.lineTo(30 * scale, 40 * scale);
      ctx.lineTo(30 * scale, 80 * scale);
      ctx.lineTo(20 * scale, 80 * scale);
      ctx.closePath();
      ctx.fill();

      // Draw keyhole circle
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.arc(50 * scale, 30 * scale, 5 * scale, 0, Math.PI * 2);
      ctx.fill();

      // Draw keyhole slot
      ctx.fillRect(47.5 * scale, 35 * scale, 5 * scale, 7 * scale);
    }

    function generateIcons() {
      const sizes = [16, 48, 128];
      sizes.forEach(size => {
        const canvas = document.getElementById(`canvas${size}`);
        drawIcon(canvas);
        
        // Download
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `icon${size}.png`;
          a.click();
          URL.revokeObjectURL(url);
        });
      });
      alert('Icons generated! Check your downloads folder for icon16.png, icon48.png, and icon128.png. Move them to the icons/ folder in your extension directory.');
    }

    // Draw previews on load
    window.onload = () => {
      drawIcon(document.getElementById('canvas16'));
      drawIcon(document.getElementById('canvas48'));
      drawIcon(document.getElementById('canvas128'));
    };
  </script>
</body>
</html>
