<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GovernCrypto — Confirm Vote</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .close-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 1000;
    }
    .close-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .card {
      background: #1e1e3a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #7c6af7;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 6px;
    }

    .dao-name {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    .vote-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,255,136,0.06);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .vote-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }

    .vote-choice {
      font-size: 16px;
      font-weight: 700;
      color: #00ff88;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c6af7, #5a4fcf);
      color: white;
      box-shadow: 0 4px 14px rgba(124,106,247,0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(124,106,247,0.55);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: #94a3b8;
    }

    #status.success { color: #00ff88; font-weight: 600; }
    #status.error   { color: #EF0606; }
    #status.loading { color: #7c6af7; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(124,106,247,0.3);
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-proposal {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 20px 0;
    }

    #vote-content { display: none; }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()" title="Close">×</button>
  <div class="card">
    <div class="logo"><img src="logo.png" alt="GovernCrypto" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 6px;">GovernCrypto</div>

    <div id="loading-proposal">
      <span class="spinner"></span> Loading proposal...
    </div>

    <div id="vote-content">
      <h1 id="proposal-title">Loading...</h1>
      <div class="dao-name" id="dao-name"></div>

      <div class="divider"></div>

      <div class="vote-row">
        <div>
          <div class="vote-label">Your Vote</div>
          <div class="vote-choice" id="choice-label">—</div>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-sign">
        Confirm &amp; Sign with Wallet
      </button>

      <div id="status"></div>
    </div>
  </div>

  <script src="sign.js"></script>
</body>
</html>
